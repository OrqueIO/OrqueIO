<div class="bpmn-viewer-container">
  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button type="button" class="zoom-btn" (click)="zoomIn()" title="Zoom in">+</button>
    <button type="button" class="zoom-btn" (click)="resetZoom()" title="Reset zoom">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3h-6zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3v6zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6h6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6v-6z"/>
      </svg>
    </button>
    <button type="button" class="zoom-btn" (click)="zoomOut()" title="Zoom out">-</button>
  </div>

  <!-- Loading state -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <span>Loading diagram...</span>
  </div>

  <!-- Error state -->
  <div class="error-overlay" *ngIf="errorMessage">
    <span class="error-icon">!</span>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- Canvas container -->
  <div #canvas class="bpmn-canvas"></div>
</div>
