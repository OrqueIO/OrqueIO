<div class="dialog-backdrop" (click)="onBackdropClick($event)">
  <div class="dialog-container">
    <div class="dialog-header">
      <h2 class="dialog-title">{{ 'admin.tenants.createNewTenant' | translate }}</h2>
    </div>

    <form [formGroup]="tenantForm" (ngSubmit)="onSubmit()">
      <div class="dialog-body">
        <!-- Tenant ID -->
        <div class="form-group">
          <label for="tenantId" class="form-label">
            {{ 'admin.tenants.id' | translate }} *
          </label>
          <input
            type="text"
            id="tenantId"
            formControlName="id"
            class="form-control"
            [class.is-invalid]="idError"
            autocomplete="off"
          />
          <div class="form-error" *ngIf="idError">
            {{ idError | translate }}
          </div>
        </div>

        <!-- Tenant Name -->
        <div class="form-group">
          <label for="tenantName" class="form-label">
            {{ 'admin.tenants.name' | translate }}
          </label>
          <input
            type="text"
            id="tenantName"
            formControlName="name"
            class="form-control"
            autocomplete="off"
          />
        </div>
      </div>

      <div class="dialog-footer">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="onCancel()"
          [disabled]="saving">
          {{ 'CANCEL' | translate }}
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="!tenantForm.valid || saving">
          <span *ngIf="!saving">{{ 'CREATE' | translate }}</span>
          <span *ngIf="saving">{{ 'CREATING' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
