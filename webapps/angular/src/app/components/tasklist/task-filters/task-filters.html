<!-- Loading State -->
<div class="loading-state" *ngIf="loading">
  <span class="spinner"></span>
  {{ 'common.loading' | translate }}
</div>

<!-- Error State -->
<div class="error-state" *ngIf="error">
  <span class="error-icon">!</span>
  <span class="error-message">{{ 'tasklist.filtersLoadError' | translate }}</span>
</div>

<!-- Filters List -->
<div class="filters-list" *ngIf="!loading && !error">
  <!-- Empty State -->
  <div class="empty-state" *ngIf="filters.length === 0">
    <span class="info-icon">i</span>
    <p>{{ 'tasklist.noFiltersAvailable' | translate }}</p>

    <button class="btn-add-filter"
            *ngIf="canCreate$ | async"
            (click)="openCreateModal()">
      <span class="plus-icon">+</span>
      {{ 'tasklist.addFilter' | translate }}
    </button>
  </div>

  <!-- Filter Items -->
  <ul class="filter-items" *ngIf="filters.length > 0">
    <li *ngFor="let filter of displayedFilters; trackBy: trackByFilterId"
        class="filter-item"
        [class.active]="isSelected(filter)"
        [class.has-refresh]="hasRefreshEnabled(filter)"
        [ngStyle]="getFilterStyle(filter)"
        (click)="selectFilter(filter)">

      <div class="filter-content">
        <h4 class="filter-name">
          <a href="javascript:void(0)"
             [ngStyle]="getFilterTextStyle(filter)"
             [appTooltip]="filter.properties?.description || ''"
             tooltipPlacement="right">
            {{ filter.name }}
          </a>

          <!-- Auto-refresh indicator -->
          <span class="refresh-indicator"
                *ngIf="hasRefreshEnabled(filter)"
                [appTooltip]="'filter.autoRefreshEnabled' | translate"
                tooltipPlacement="top">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </span>

          <!-- Item count badge -->
          <span class="filter-count"
                *ngIf="isSelected(filter) && filterCount > 0"
                [class.high-count]="filterCount > 100">
            {{ filterCount }}
          </span>
        </h4>

        <!-- Description (shown when selected) -->
        <p class="filter-description"
           *ngIf="filter.properties?.description && isSelected(filter)">
          {{ filter.properties.description }}
        </p>
      </div>

      <!-- Actions (shown when selected) -->
      <div class="filter-actions" *ngIf="isSelected(filter)">
        <button class="btn-action"
                (click)="openEditModal($event, filter)"
                [appTooltip]="'tasklist.filterDetails' | translate"
                tooltipPlacement="left">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </li>
  </ul>

  <!-- Add Filter Button -->
  <div class="add-filter-container" *ngIf="filters.length > 0 && (canCreate$ | async)">
    <button class="btn-add-filter"
            (click)="openCreateModal()"
            [appTooltip]="'tasklist.createFilterHint' | translate"
            tooltipPlacement="right">
      <span class="plus-icon">+</span>
      {{ 'tasklist.createFilter' | translate }}
    </button>
  </div>
</div>

<!-- Filter Pagination -->
<app-pagination
  *ngIf="totalFilters > pageSize"
  [current]="currentPage"
  [size]="pageSize"
  [total]="totalFilters"
  (pageChange)="onPageChange($event)"
  class="filters-pagination">
</app-pagination>
