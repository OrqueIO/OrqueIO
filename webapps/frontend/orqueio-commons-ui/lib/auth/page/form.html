<!-- # CE - orqueio-commons-ui/lib/auth/page/form.html -->
<form ng-submit="login()"
      name="signinForm"
      request-aware
      class="login-form">

  <div class="form-group-modern">
    <label class="input-label" for="usernameInput">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      {{ 'PAGE_LOGIN_USERNAME' | translate }}
    </label>
    <input autofocus
           tabindex="1"
           type="text"
           id="usernameInput"
           class="form-control form-control-modern"
           placeholder="{{ 'PAGE_LOGIN_USERNAME_PLACEHOLDER' | translate }}"
           auto-fill
           required
           ng-model="username">
  </div>

  <div class="form-group-modern">
    <label class="input-label" for="passwordInput">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      {{ 'PAGE_LOGIN_PASSWORD' | translate }}
    </label>
    <div class="password-input-wrapper">
      <input tabindex="2"
             ng-attr-type="{{ showPassword ? 'text' : 'password' }}"
             id="passwordInput"
             class="form-control form-control-modern"
             placeholder="{{ 'PAGE_LOGIN_PASSWORD_PLACEHOLDER' | translate }}"
             auto-fill
             required
             ng-model="password">
      <button type="button"
              class="password-toggle"
              tabindex="-1"
              ng-click="showPassword = !showPassword"
              aria-label="{{ showPassword ? 'Hide password' : 'Show password' }}">
        <svg ng-if="!showPassword" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg ng-if="showPassword" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>
  </div>

  <button tabindex="3"
          class="btn btn-lg btn-primary btn-signin"
          type="submit"
          ng-disabled="status === 'LOADING'"
          ng-class="{'btn-loading': status === 'LOADING'}">
    <span class="btn-text">{{ 'PAGE_LOGIN_SIGN_IN_ACTION' | translate }}</span>
    <svg ng-if="status !== 'LOADING'" class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
      <polyline points="10 17 15 12 10 7"></polyline>
      <line x1="15" y1="12" x2="3" y2="12"></line>
    </svg>
    <span ng-if="status === 'LOADING'" class="btn-spinner"></span>
  </button>

  <div class="register-link-container" ng-if="showRegisterLink">
    <span class="register-text">{{ 'PAGE_LOGIN_NO_ACCOUNT' | translate }}</span>
    <a ng-href="{{ registerUrl }}" class="register-link">{{ 'PAGE_LOGIN_CREATE_ACCOUNT' | translate }}</a>
  </div>
</form>
<!-- / CE - orqueio-commons-ui/lib/auth/page/form.html -->
