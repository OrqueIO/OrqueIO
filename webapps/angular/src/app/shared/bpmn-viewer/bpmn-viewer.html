<div class="bpmn-viewer-container">
  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button type="button" class="zoom-btn" *ngIf="showExpandButton" (click)="expandToggle.emit()" [title]="isExpanded ? 'Restore' : 'Expand'">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <polyline points="21 15 21 21 15 21"></polyline>
        <polyline points="3 9 3 3 9 3"></polyline>
      </svg>
    </button>
    <button type="button" class="zoom-btn" *ngIf="showFocusButton && focusElementId" (click)="focusClick.emit()" title="Focus">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="10" r="3"></circle>
        <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"></path>
      </svg>
    </button>
    <button type="button" class="zoom-btn" (click)="zoomIn()" title="Zoom in">+</button>
    <button type="button" class="zoom-btn" (click)="zoomOut()" title="Zoom out">-</button>
  </div>

  <!-- Loading state -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <span>Loading diagram...</span>
  </div>

  <!-- Error state -->
  <div class="error-overlay" *ngIf="errorMessage">
    <span class="error-icon">!</span>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- Canvas container -->
  <div #canvas class="bpmn-canvas"></div>
</div>
