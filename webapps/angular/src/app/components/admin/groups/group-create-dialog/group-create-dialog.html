<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container modal-sm" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 class="modal-title">{{ 'admin.groups.createGroup' | translate }}</h3>
    </div>

    <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="modal-form-group">
          <label for="groupId">{{ 'admin.groups.id' | translate }} <span class="required">*</span></label>
          <input
            id="groupId"
            type="text"
            formControlName="id"
            class="modal-input"
            [class.is-invalid]="idError" />
          <span *ngIf="idError" class="modal-error">
            {{ idError | translate }}
          </span>
        </div>

        <div class="modal-form-group">
          <label for="groupName">{{ 'admin.groups.name' | translate }} <span class="required">*</span></label>
          <input
            id="groupName"
            type="text"
            formControlName="name"
            class="modal-input"
            [class.is-invalid]="nameError" />
          <span *ngIf="nameError" class="modal-error">
            {{ nameError | translate }}
          </span>
        </div>

        <div class="modal-form-group">
          <label for="groupType">{{ 'admin.groups.type' | translate }}</label>
          <input
            id="groupType"
            type="text"
            formControlName="type"
            class="modal-input" />
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="modal-btn modal-btn-secondary"
          (click)="onCancel()"
          [disabled]="saving">
          {{ 'CANCEL' | translate }}
        </button>
        <button
          type="submit"
          class="modal-btn modal-btn-primary"
          [disabled]="!groupForm.valid || saving">
          <span *ngIf="saving">{{ 'CREATING' | translate }}...</span>
          <span *ngIf="!saving">{{ 'admin.groups.createNewGroup' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
