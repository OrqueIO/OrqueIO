<div class="bpmn-viewer-container">
  <!-- Zoom controls -->
  <div class="zoom-controls">
    <button type="button" class="zoom-btn" (click)="zoomIn()" title="Zoom in">+</button>
    <button type="button" class="zoom-btn" *ngIf="showExpandButton && !isExpanded" (click)="expandToggle.emit()" title="Expand">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <polyline points="21 15 21 21 15 21"></polyline>
        <polyline points="3 9 3 3 9 3"></polyline>
      </svg>
    </button>
    <button type="button" class="zoom-btn" *ngIf="showExpandButton && isExpanded" (click)="expandToggle.emit()" title="Restore">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 14 10 14 10 20"></polyline>
        <polyline points="20 10 14 10 14 4"></polyline>
        <polyline points="14 10 21 3"></polyline>
        <polyline points="3 21 10 14"></polyline>
      </svg>
    </button>
    <button type="button" class="zoom-btn" (click)="resetZoom()" title="Fit to view">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
    <button type="button" class="zoom-btn" (click)="zoomOut()" title="Zoom out">-</button>
  </div>

  <!-- Loading state -->
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <span>Loading diagram...</span>
  </div>

  <!-- Error state -->
  <div class="error-overlay" *ngIf="errorMessage">
    <span class="error-icon">!</span>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- Canvas container -->
  <div #canvas class="bpmn-canvas"></div>
</div>
