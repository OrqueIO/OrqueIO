<div class="row welcome-page">
  <div class="col-sm-8 col-xs-12">
    <!-- Info banner for users with restricted access (only welcome) -->
    <div ng-if="isRestrictedUser()" class="restricted-access-banner">
      <div class="banner-content">
        <div class="banner-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
        </div>
        <div class="banner-text">
          <h4 class="banner-title">{{'RESTRICTED_ACCESS_TITLE' | translate}}</h4>
          <p class="banner-message">{{'RESTRICTED_ACCESS_MESSAGE' | translate}}</p>
        </div>
      </div>
    </div>

    <section ng-init="authorized = $root.authentication.authorizedApps"
             class="webapps">
      <div class="inner"
           ng-init="cols = columnWidth()">
        <div class="row">
          <div class="col-xs-12">
            <h3 class="section-title">{{'APPLICATIONS' | translate}}</h3>
          </div>
        </div>

        <div class="row">
          <div ng-if="canAccessApp('cockpit')"
               ng-class="'col-xs-' + cols"
               class="cockpit-app">
            <a class="app-label-wrapper"
               ng-href="{{ (':appRoot/app/cockpit/:engine/') | uri }}">
            </a>
            <h3 class="app-name">
              <a ng-href="{{ (':appRoot/app/cockpit/:engine/') | uri }}">{{'COCKPIT' | translate}}</a>
            </h3>
          </div>


          <div ng-if="canAccessApp('tasklist')"
               ng-class="'col-xs-' + cols"
               class="tasklist-app">
            <a class="app-label-wrapper"
               ng-href="{{ (':appRoot/app/tasklist/:engine/') | uri }}">
            </a>
            <h3 class="app-name">
              <a ng-href="{{ (':appRoot/app/tasklist/:engine/') | uri }}">{{'TASKLIST' | translate}}</a>
            </h3>
          </div>


          <div ng-if="canAccessApp('admin')"
               ng-class="'col-xs-' + cols"
               class="admin-app">
            <a class="app-label-wrapper"
               ng-href="{{ (':appRoot/app/admin/:engine/') | uri }}">
            </a>
            <h3 class="app-name">
              <a ng-href="{{ (':appRoot/app/admin/:engine/') | uri }}">{{'ADMIN' | translate}}</a>
            </h3>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="inner" custom-links></div>
    </section>
  </div>


  <section ng-if="profilePlugins.length"
           class="col-sm-4 col-xs-12"
           id="user-profile">
    <div class="inner">
      <view ng-repeat="plugin in profilePlugins"
            class="plugin"
            ng-class="plugin.id"
            data-plugin-id="{{ plugin.id }}"
            provider="plugin"></view>
    </div>
  </section>

  <div ng-if="plugins.length"
       class="col-xs-12 plugins">
    <div class="row">
      <view ng-repeat="plugin in plugins"
            class="plugin"
            ng-class="plugin.id"
            data-plugin-id="{{ plugin.id }}"
            provider="plugin"></view>
    </div>
  </div>
</div>
