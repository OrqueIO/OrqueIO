<div class="search-widget">
  <!-- Search pills container -->
  <div class="search-pills">
    <!-- Existing search criteria as pills -->
    <div class="search-pill"
         *ngFor="let search of searches; let i = index; trackBy: trackByIndex"
         [class.editing]="editingIndex === i"
         [class.invalid]="!isValidSearch(search)">

      <!-- Display mode -->
      <ng-container *ngIf="editingIndex !== i">
        <span class="pill-type">{{ search.type.label }}</span>
        <span class="pill-name" *ngIf="search.name">{{ search.name }}</span>
        <span class="pill-operator">{{ search.operator.label }}</span>
        <span class="pill-value" (click)="editSearch(i)">{{ search.value }}</span>
        <button class="pill-remove" (click)="removeSearch(i)" type="button">
          <fa-icon [icon]="faTimes"></fa-icon>
        </button>
      </ng-container>

      <!-- Edit mode -->
      <ng-container *ngIf="editingIndex === i">
        <span class="pill-type">{{ search.type.label }}</span>

        <!-- Name input for extended searches -->
        <input *ngIf="search.type.allowName"
               type="text"
               class="pill-name-input"
               [placeholder]="'Name'"
               [(ngModel)]="search.name"
               (keydown)="onKeydown($event, i)" />

        <!-- Operator dropdown -->
        <select class="pill-operator-select"
                [(ngModel)]="search.operator"
                [compareWith]="compareOperators">
          <option *ngFor="let op of search.type.operators" [ngValue]="op">
            {{ op.label }}
          </option>
        </select>

        <!-- Value input -->
        <input type="text"
               class="pill-value-input"
               [placeholder]="search.type.placeholder || 'Value'"
               [(ngModel)]="search.value"
               (keydown)="onKeydown($event, i)"
               (blur)="confirmSearch(i)" />

        <button class="pill-remove" (click)="removeSearch(i)" type="button">
          <fa-icon [icon]="faTimes"></fa-icon>
        </button>
      </ng-container>
    </div>

    <!-- Add criteria input -->
    <div class="search-input-wrapper">
      <input type="text"
             #searchInput
             class="search-input"
             [placeholder]="placeholder"
             [(ngModel)]="inputQuery"
             (focus)="onInputFocus()"
             (input)="onInputChange()" />

      <!-- Type dropdown -->
      <div class="search-dropdown" *ngIf="showDropdown && filteredTypes.length > 0">
        <div class="dropdown-item"
             *ngFor="let type of filteredTypes"
             (click)="selectType(type)">
          <span class="dropdown-label">{{ type.label }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="search-actions">
    <!-- Clear all -->
    <button class="action-btn clear-btn"
            *ngIf="searches.length > 0"
            (click)="clearAll()"
            type="button"
            title="Clear all">
      <fa-icon [icon]="faTimes"></fa-icon>
    </button>

    <!-- Stored criteria dropdown -->
    <div class="stored-criteria-wrapper">
      <button class="action-btn stored-btn"
              (click)="toggleStoredDropdown()"
              type="button"
              title="Save/Load criteria">
        <fa-icon [icon]="faFolder"></fa-icon>
        <fa-icon [icon]="faChevronDown" class="chevron"></fa-icon>
      </button>

      <div class="stored-dropdown" *ngIf="showStoredDropdown">
        <!-- Save current -->
        <div class="stored-save" *ngIf="searches.length > 0">
          <input type="text"
                 class="stored-name-input"
                 placeholder="Save as..."
                 [(ngModel)]="newCriteriaName"
                 (keydown.enter)="saveCurrentCriteria()" />
          <button class="stored-save-btn"
                  (click)="saveCurrentCriteria()"
                  [disabled]="!newCriteriaName.trim()"
                  type="button">
            <fa-icon [icon]="faSave"></fa-icon>
          </button>
        </div>

        <!-- Divider -->
        <div class="stored-divider" *ngIf="searches.length > 0 && storedCriteriaNames.length > 0"></div>

        <!-- Stored list -->
        <div class="stored-list" *ngIf="storedCriteriaNames.length > 0">
          <div class="stored-item"
               *ngFor="let name of storedCriteriaNames"
               (click)="loadCriteria(name)">
            <span class="stored-item-name">{{ name }}</span>
            <button class="stored-delete-btn"
                    (click)="deleteCriteria(name, $event)"
                    type="button">
              <fa-icon [icon]="faTrash"></fa-icon>
            </button>
          </div>
        </div>

        <!-- Empty state -->
        <div class="stored-empty" *ngIf="storedCriteriaNames.length === 0 && searches.length === 0">
          No saved criteria
        </div>
      </div>
    </div>
  </div>
</div>
