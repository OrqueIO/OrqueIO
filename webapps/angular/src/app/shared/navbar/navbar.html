<nav class="navbar" [class.transparent]="transparent">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-logo">
      <img src="images/orqueio.png" alt="OrqueIO Logo" class="logo-image">
    </a>

    <!-- Menu Items -->
    <div class="navbar-menu" *ngIf="menuItems.length > 0">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        class="menu-item"
      >
        <fa-icon [icon]="item.icon" class="menu-icon"></fa-icon>
        <span class="menu-label">{{ item.label | translate }}</span>
      </a>
    </div>

    <div class="navbar-actions">
      <!-- Dynamic Action Buttons -->
      <div class="nav-action-buttons" *ngIf="navActions.length > 0">
        <button
          *ngFor="let action of navActions"
          type="button"
          class="nav-action-btn"
          [class.primary]="action.primary"
          (click)="onActionClick(action)"
          [title]="action.label | translate"
        >
          <span class="action-icon" *ngIf="action.svgIcon" [innerHTML]="sanitizeSvg(action.svgIcon)"></span>
          <span class="action-label">{{ action.label | translate }}</span>
        </button>
      </div>

      <button
        type="button"
        class="lang-toggle"
        (click)="toggleLanguage()"
        [title]="currentLang === 'fr' ? 'Switch to English' : 'Passer en Français'"
      >
        <span class="flag" *ngIf="currentLang === 'fr'">
          <svg viewBox="0 0 3 2" width="28" height="18">
            <rect width="1" height="2" fill="#002395"/>
            <rect width="1" height="2" x="1" fill="#fff"/>
            <rect width="1" height="2" x="2" fill="#ED2939"/>
          </svg>
          <strong>FR</strong>
        </span>
        <span class="flag" *ngIf="currentLang === 'en'">
          <svg viewBox="0 0 50 30" width="28" height="18">
            <rect width="50" height="30" fill="#012169"/>
            <path d="M0,0 L50,30 M50,0 L0,30" stroke="#fff" stroke-width="6"/>
            <path d="M0,0 L50,30" stroke="#C8102E" stroke-width="2" transform="translate(0,0)"/>
            <path d="M50,0 L0,30" stroke="#C8102E" stroke-width="2"/>
            <path d="M25,0 V30 M0,15 H50" stroke="#fff" stroke-width="10"/>
            <path d="M25,0 V30 M0,15 H50" stroke="#C8102E" stroke-width="6"/>
          </svg>
          <strong>EN</strong>
        </span>
      </button>

      <ng-container *ngIf="showAuth && isAuthenticated">
        <a routerLink="/profile" class="nav-link profile-link">
          <span class="nav-icon">
            <fa-icon [icon]="faUser"></fa-icon>
          </span>
          <span class="nav-username">{{ userName }}</span>
        </a>

        <button type="button" class="logout-btn" (click)="onLogout()" [title]="'LOGOUT' | translate">
          <fa-icon [icon]="faSignOut"></fa-icon>
        </button>
      </ng-container>
    </div>
  </div>
</nav>
