<div class="access-denied-container">
  <div class="access-denied-content">
    <!-- Lock Icon -->
    <div class="icon-container">
      <fa-icon [icon]="faLock" class="lock-icon"></fa-icon>
    </div>

    <!-- Title -->
    <h1 class="title">{{ 'ACCESS_DENIED_TITLE' | translate }}</h1>

    <!-- Subtitle -->
    <p class="subtitle">{{ 'ACCESS_DENIED_SUBTITLE' | translate }}</p>

    <!-- Reason -->
    <div class="reason-box">
      <p class="reason">{{ deniedReason }}</p>

      @if (userName) {
        <p class="user-info">
          {{ 'ACCESS_DENIED_LOGGED_AS' | translate }}: <strong>{{ userName }}</strong>
        </p>
      }
    </div>

    <!-- Help text -->
    <p class="help-text">{{ 'ACCESS_DENIED_HELP' | translate }}</p>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" (click)="goHome()">
        <fa-icon [icon]="faHome"></fa-icon>
        {{ 'ACCESS_DENIED_GO_HOME' | translate }}
      </button>

      <button class="btn btn-secondary" (click)="goBack()">
        <fa-icon [icon]="faArrowLeft"></fa-icon>
        {{ 'ACCESS_DENIED_GO_BACK' | translate }}
      </button>
    </div>

    <!-- Logout option -->
    <div class="logout-section">
      <p class="logout-text">{{ 'ACCESS_DENIED_WRONG_ACCOUNT' | translate }}</p>
      <button class="btn-link" (click)="logout()">
        {{ 'ACCESS_DENIED_LOGOUT' | translate }}
      </button>
    </div>
  </div>
</div>
