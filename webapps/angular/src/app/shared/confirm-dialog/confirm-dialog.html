<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container modal-sm" role="dialog" aria-modal="true">
    <div class="modal-header" [class.modal-header-danger]="isDanger">
      <h3 class="modal-title">{{ title | translate }}</h3>
    </div>
    <div class="modal-body">
      <p>{{ message | translate }}</p>

      <div class="modal-form-group" *ngIf="showInput">
        <label *ngIf="inputLabel">{{ inputLabel | translate }}</label>
        <input
          type="text"
          class="modal-input"
          [value]="inputValue"
          (input)="onInputChange($any($event.target).value)"
          [placeholder]="inputPlaceholder" />
      </div>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="modal-btn modal-btn-secondary"
        (click)="onCancel()">
        {{ cancelLabel | translate }}
      </button>
      <button
        type="button"
        class="modal-btn"
        [ngClass]="isDanger ? 'modal-btn-danger' : 'modal-btn-primary'"
        (click)="onConfirm()">
        {{ confirmLabel | translate }}
      </button>
    </div>
  </div>
</div>
