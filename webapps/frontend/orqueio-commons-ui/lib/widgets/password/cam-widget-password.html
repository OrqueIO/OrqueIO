<div class="password-input right-addon">
  <script type="text/ng-template" id="popover">
      <p>{{ tooltip | translate }}</p>

      <ul>
        <li ng-repeat="rule in rules"
            translate="{{ rule.placeholder }}"
            translate-values="{{ rule.parameter }}"
            ng-if="!rule.valid">
        </li>
      </ul>
  </script>

  <i ng-if="loadingState === 'NOT_OK' && password.length > 0" class="glyphicon glyphicon-remove-circle validation-icon"></i>
  <i ng-if="loadingState === 'OK'" class="glyphicon glyphicon-ok-circle validation-icon"></i>
  <i ng-if="loadingState === 'LOADING'" class="glyphicon glyphicon-refresh animate-spin validation-icon"></i>

  <div class="password-input-wrapper">
    <input id="inputPassword"
      name="inputPassword"
      class="form-control"
      ng-attr-type="{{ showPassword ? 'text' : 'password' }}"
      ng-model="password"
      ng-invalid="true"
      placeholder="{{ 'PASSWORD_PLACEHOLDER' | translate }}"
      uib-popover-template="'popover'"
      popover-enable="loadingState === 'NOT_OK'"
      popover-is-open="loadingState === 'NOT_OK' && password.length > 0"
      popover-trigger="'focus'"
      required>
    <button type="button"
            class="password-toggle"
            tabindex="-1"
            ng-click="showPassword = !showPassword"
            aria-label="{{ showPassword ? 'Hide password' : 'Show password' }}">
      <svg ng-if="!showPassword" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <svg ng-if="showPassword" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </button>
  </div>
</div>
