<!-- OAuth2/OIDC Login Buttons -->
<!-- Only displayed when providers are configured in the backend -->
@if (!loading && providers.length > 0) {
  <div class="oauth2-login-section">
    <div class="oauth2-divider">
      <span>{{ 'PAGE_LOGIN_ALTERNATIVE_LOGINS' | translate }}</span>
    </div>
    <div class="oauth2-buttons">
      @for (provider of providers; track provider.id) {
        <a
          [href]="setupRequired ? null : getLoginUrl(provider)"
          class="btn-oauth2-provider"
          [class.disabled]="setupRequired"
          [title]="getTooltip(provider)"
          [attr.aria-label]="getAriaLabel(provider)"
          [attr.aria-disabled]="setupRequired"
          role="button"
          (click)="onProviderClick(provider, $event)"
        >
          <span [class]="getIconClass(provider)"></span>
          <span class="oauth2-provider-name">{{ provider.name }}</span>
        </a>
      }
    </div>
    @if (setupRequired) {
      <p class="oauth2-setup-hint">
        {{ 'PAGE_LOGIN_SSO_SETUP_HINT' | translate }}
      </p>
    }
  </div>
}
