<!-- Loading State -->
<div class="loading-state" *ngIf="loading">
  <span class="spinner"></span>
  {{ 'common.loading' | translate }}
</div>

<!-- Error State -->
<div class="error-state" *ngIf="error && !loading">
  <span class="error-icon">!</span>
  <span class="error-message">{{ error }}</span>
</div>

<!-- Diagram Viewer -->
<div class="diagram-wrapper" *ngIf="!loading && !error && xml">
  <!-- Toolbar -->
  <div class="diagram-toolbar">
    <div class="toolbar-group">
      <button class="toolbar-btn"
              (click)="zoomIn()"
              [title]="'tasklist.zoomIn' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>

      <button class="toolbar-btn"
              (click)="zoomOut()"
              [title]="'tasklist.zoomOut' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>

      <button class="toolbar-btn"
              (click)="resetZoom()"
              [title]="'tasklist.resetZoom' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-group">
      <button class="toolbar-btn primary"
              (click)="scrollToTask()"
              *ngIf="task.taskDefinitionKey"
              [title]="'tasklist.scrollToTask' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="10" r="3"/>
          <path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"/>
        </svg>
        {{ 'tasklist.focusTask' | translate }}
      </button>
    </div>
  </div>

  <!-- BPMN Viewer Component -->
  <div class="diagram-container">
    <app-bpmn-viewer
      #bpmnViewer
      [xml]="xml"
      [highlightedActivities]="highlightedActivities"
      [selectedActivity]="selectedActivity"
      (viewerReady)="onViewerReady()"
      (error)="onViewerError($event)">
    </app-bpmn-viewer>
  </div>
</div>

<!-- No Diagram Available -->
<div class="no-diagram" *ngIf="!loading && !error && !xml">
  <span class="no-diagram-icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
  </span>
  <p>{{ 'tasklist.noDiagramAvailable' | translate }}</p>
</div>
