<!-- Loading State -->
<div class="loading-state" *ngIf="loading">
  <span class="spinner"></span>
  {{ 'common.loading' | translate }}
</div>

<!-- Error State -->
<div class="error-state" *ngIf="error && !loading">
  <span class="error-icon">!</span>
  <span class="error-message">{{ error }}</span>
</div>

<!-- Diagram Viewer -->
<div class="diagram-wrapper" *ngIf="!loading && !error && xml">
  <!-- BPMN Viewer Component -->
  <div class="diagram-container">
    <app-bpmn-viewer
      #bpmnViewer
      [xml]="xml"
      [highlightedActivities]="highlightedActivities"
      [selectedActivity]="selectedActivity"
      [showExpandButton]="true"
      [isExpanded]="isExpanded"
      [showFocusButton]="true"
      [focusElementId]="task.taskDefinitionKey"
      (viewerReady)="onViewerReady()"
      (error)="onViewerError($event)"
      (expandToggle)="toggleExpand()"
      (focusClick)="scrollToTask()">
    </app-bpmn-viewer>
  </div>
</div>

<!-- No Diagram Available -->
<div class="no-diagram" *ngIf="!loading && !error && !xml">
  <span class="no-diagram-icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
  </span>
  <p>{{ 'tasklist.noDiagramAvailable' | translate }}</p>
</div>
