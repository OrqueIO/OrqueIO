<!-- Task Actions Bar -->
<div class="actions-bar">
  <!-- Primary Actions -->
  <div class="primary-actions">
    <!-- Claim Button -->
    <button *ngIf="canClaim"
            class="btn btn-primary"
            (click)="onClaim()"
            [disabled]="loading"
            type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      {{ 'tasklist.claim' | translate }}
    </button>

    <!-- Unclaim Button -->
    <button *ngIf="canUnclaim"
            class="btn btn-secondary"
            (click)="onUnclaim()"
            [disabled]="loading"
            type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      {{ 'tasklist.unclaim' | translate }}
    </button>

    <!-- Complete Button -->
    <button *ngIf="canComplete"
            class="btn btn-success"
            (click)="onComplete()"
            [disabled]="loading"
            type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ 'tasklist.complete' | translate }}
    </button>
  </div>

  <!-- More Actions Menu -->
  <div class="more-actions">
    <button class="btn btn-icon"
            (click)="toggleMoreMenu()"
            [title]="'tasklist.moreActions' | translate"
            type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="1"/>
        <circle cx="19" cy="12" r="1"/>
        <circle cx="5" cy="12" r="1"/>
      </svg>
    </button>

    <!-- Dropdown Menu -->
    <div class="dropdown-menu" *ngIf="showMoreMenu">
      <div class="dropdown-backdrop" (click)="closeMoreMenu()"></div>
      <div class="dropdown-content">
        <!-- Set Assignee -->
        <button class="menu-item" (click)="onSetAssignee()" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          {{ 'tasklist.setAssignee' | translate }}
        </button>

        <!-- Delegate -->
        <button class="menu-item" (click)="onDelegate()" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          {{ 'tasklist.delegate' | translate }}
        </button>

        <div class="menu-divider"></div>

        <!-- Add Comment -->
        <button class="menu-item" (click)="onAddComment()" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          {{ 'tasklist.addComment' | translate }}
        </button>

        <div class="menu-divider"></div>

        <!-- Set Due Date -->
        <button class="menu-item" (click)="onSetDueDate()" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ 'tasklist.setDueDate' | translate }}
        </button>

        <!-- Set Follow-up -->
        <button class="menu-item" (click)="onSetFollowUp()" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ 'tasklist.setFollowUp' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" *ngIf="loading">
  <span class="spinner"></span>
</div>
