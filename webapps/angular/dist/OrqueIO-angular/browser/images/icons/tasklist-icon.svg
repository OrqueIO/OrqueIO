<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="taskShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.3"/>
    </filter>
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Clipboard background -->
  <rect x="25" y="25" width="70" height="85" rx="10" fill="white" filter="url(#taskShadow)"/>

  <!-- Clipboard top clip -->
  <rect x="40" y="18" width="40" height="14" rx="4" fill="url(#greenGrad)"/>
  <rect x="50" y="22" width="20" height="6" rx="3" fill="white" opacity="0.5"/>

  <!-- Task item 1 -->
  <circle cx="40" cy="50" r="5" fill="#e2e8f0"/>
  <rect x="52" y="47" width="35" height="6" rx="3" fill="url(#greenGrad)"/>

  <!-- Task item 2 -->
  <circle cx="40" cy="68" r="5" fill="#e2e8f0"/>
  <rect x="52" y="65" width="28" height="6" rx="3" fill="url(#greenGrad)"/>

  <!-- Task item 3 -->
  <circle cx="40" cy="86" r="5" fill="#e2e8f0"/>
  <rect x="52" y="83" width="32" height="6" rx="3" fill="#e2e8f0"/>

  <!-- Green checkmark badge -->
  <circle cx="30" cy="30" r="16" fill="url(#greenGrad)" filter="url(#badgeShadow)"/>
  <polyline points="22,30 28,36 38,24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
