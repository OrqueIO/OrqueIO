<app-cockpit-header
  [breadcrumbs]="breadcrumbs"
></app-cockpit-header>

<div class="batch-page">
  <div class="batch-lists">
    <!-- Runtime Batches (In Progress) -->
    <app-batch-runtime-list
      (batchSelect)="onBatchSelect($event, 'runtime')">
    </app-batch-runtime-list>

    <!-- History Batches (Completed) -->
    <app-batch-history-list
      (batchSelect)="onBatchSelect($event, 'history')">
    </app-batch-history-list>
  </div>

  <div class="batch-detail-panel">
    <!-- Batch Details -->
    <app-batch-detail></app-batch-detail>
  </div>
</div>
