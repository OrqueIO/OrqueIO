<div class="admin-layout">
  <main class="admin-main">
    <app-admin-page-header
      [breadcrumbs]="[{ label: 'Users', translateKey: 'admin.dashboard.users' }]"
      [showRefresh]="true"
      (refresh)="refresh()">
    </app-admin-page-header>

    <div class="page-content">
      <!-- Toolbar with search and create button -->
      <div class="toolbar">
        <app-search-bar
          placeholderKey="admin.users.searchPlaceholder"
          (search)="onSearch($event)">
        </app-search-bar>
        <button class="btn-create" (click)="onCreateUser()">
          <fa-icon [icon]="faPlus"></fa-icon>
          <span>{{ 'admin.users.createUser' | translate }}</span>
        </button>
      </div>

      <!-- Results info -->
      <header class="results-info">
        <h2 class="results-title">
          {{ (total$ | async) ?? 0 }} {{ 'admin.users.title' | translate | lowercase }}
        </h2>
      </header>

      <!-- Data table -->
      <app-data-table
        [columns]="columns"
        [data]="(users$ | async) ?? []"
        [loading]="(loading$ | async) ?? false"
        [sortBy]="sortBy"
        [sortOrder]="sortOrder"
        emptyMessageKey="admin.users.noUsers"
        (sortChange)="onSort($event)"
        (rowClick)="onRowClick($event)">
      </app-data-table>

      <!-- Pagination -->
      <app-pagination
        [current]="currentPage"
        [size]="pageSize"
        [total]="(total$ | async) ?? 0"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </div>
  </main>
</div>

<!-- Actions template -->
<ng-template #actionsTemplate let-user>
  <button class="btn-icon" (click)="editUser(user, $event)" [title]="'admin.users.edit' | translate">
    <fa-icon [icon]="faPen"></fa-icon>
  </button>
  <button class="btn-icon btn-icon--danger" (click)="deleteUser(user, $event)" [title]="'admin.users.delete' | translate">
    <fa-icon [icon]="faTrash"></fa-icon>
  </button>
</ng-template>

<!-- Create User Dialog -->
<app-user-create-dialog
  *ngIf="showCreateDialog"
  (created)="onUserCreated()"
  (cancel)="onCreateDialogCancel()">
</app-user-create-dialog>

<!-- Delete User Confirmation -->
<app-confirm-dialog
  *ngIf="showDeleteConfirm"
  title="admin.users.deleteConfirmTitle"
  [message]="'admin.users.deleteConfirmMessage' | translate: { userId: userToDelete?.id || '' }"
  confirmLabel="DELETE"
  confirmButtonClass="btn-danger"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirm-dialog>
