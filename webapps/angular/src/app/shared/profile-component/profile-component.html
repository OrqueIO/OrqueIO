<div class="profile-card" role="region" [attr.aria-label]="'MY_PROFILE' | translate">
  <!-- État de chargement -->
  <div class="profile-loading" *ngIf="isLoading">
    <div class="loading-spinner"></div>
    <span class="loading-text">{{ 'LOADING' | translate }}</span>
  </div>

  <!-- Contenu du profil -->
  <ng-container *ngIf="!isLoading">
    <!-- Section Avatar -->
    <div class="profile-avatar-section">
      <div class="avatar-wrapper">
        <div class="profile-avatar" [class.connected]="isLoggedIn">
          <svg class="avatar-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <button class="avatar-edit-btn" *ngIf="isLoggedIn" (click)="editAvatar()" [attr.aria-label]="'PROFILE_EDIT_AVATAR' | translate">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Section Informations -->
    <div class="profile-info-section">
      <!-- Nom -->
      <div class="info-field">
        <label class="field-label">{{ 'PROFILE_FULL_NAME' | translate }}</label>
        <div class="field-content" *ngIf="!isEditingName">
          <span class="field-value">{{ userName }}</span>
          <button class="edit-btn" *ngIf="isLoggedIn" (click)="startEditName()" [attr.aria-label]="'PROFILE_EDIT_NAME' | translate">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
        </div>
        <div class="field-edit" *ngIf="isEditingName">
          <input
            type="text"
            class="edit-input"
            [(ngModel)]="editName"
            [placeholder]="'PROFILE_NAME_PLACEHOLDER' | translate"
            (keyup.enter)="saveName()"
            (keyup.escape)="cancelEditName()">
          <div class="edit-actions">
            <button class="save-btn" (click)="saveName()" [disabled]="isSaving">
              {{ isSaving ? ('SAVING' | translate) : ('SAVE' | translate) }}
            </button>
            <button class="cancel-btn" (click)="cancelEditName()">{{ 'CANCEL' | translate }}</button>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="info-field">
        <label class="field-label">{{ 'PROFILE_EMAIL' | translate }}</label>
        <div class="field-content" *ngIf="!isEditingEmail">
          <span class="field-value">{{ userEmail }}</span>
          <button class="edit-btn" *ngIf="isLoggedIn" (click)="startEditEmail()" [attr.aria-label]="'PROFILE_EDIT_EMAIL' | translate">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
        </div>
        <div class="field-edit" *ngIf="isEditingEmail">
          <input
            type="email"
            class="edit-input"
            [(ngModel)]="editEmail"
            [placeholder]="'PROFILE_EMAIL_PLACEHOLDER' | translate"
            (keyup.enter)="saveEmail()"
            (keyup.escape)="cancelEditEmail()">
          <div class="edit-actions">
            <button class="save-btn" (click)="saveEmail()" [disabled]="isSaving">
              {{ isSaving ? ('SAVING' | translate) : ('SAVE' | translate) }}
            </button>
            <button class="cancel-btn" (click)="cancelEditEmail()">{{ 'CANCEL' | translate }}</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Actions -->
    <div class="profile-actions-section" *ngIf="isLoggedIn">
      <h3 class="section-title">{{ 'PROFILE_SECURITY' | translate }}</h3>
      <div class="action-buttons">
        <button class="action-btn" (click)="changePassword()">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          {{ 'PROFILE_CHANGE_PASSWORD' | translate }}
        </button>
      </div>
    </div>

    <!-- Message d'erreur -->
    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Message de succès -->
    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>
  </ng-container>
</div>
