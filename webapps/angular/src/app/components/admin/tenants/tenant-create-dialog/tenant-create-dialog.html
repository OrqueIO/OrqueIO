<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container modal-sm" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 class="modal-title">{{ 'admin.tenants.createNewTenant' | translate }}</h3>
    </div>

    <form [formGroup]="tenantForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="modal-form-group">
          <label for="tenantId">{{ 'admin.tenants.id' | translate }} <span class="required">*</span></label>
          <input
            type="text"
            id="tenantId"
            formControlName="id"
            class="modal-input"
            [class.is-invalid]="idError"
            autocomplete="off" />
          <span *ngIf="idError" class="modal-error">
            {{ idError | translate }}
          </span>
        </div>

        <div class="modal-form-group">
          <label for="tenantName">{{ 'admin.tenants.name' | translate }}</label>
          <input
            type="text"
            id="tenantName"
            formControlName="name"
            class="modal-input"
            autocomplete="off" />
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="modal-btn modal-btn-secondary"
          (click)="onCancel()"
          [disabled]="saving">
          {{ 'CANCEL' | translate }}
        </button>
        <button
          type="submit"
          class="modal-btn modal-btn-primary"
          [disabled]="!tenantForm.valid || saving">
          <span *ngIf="!saving">{{ 'CREATE' | translate }}</span>
          <span *ngIf="saving">{{ 'CREATING' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
