<section class="batch-jobs-list">
  <header class="list-header">
    <h3 class="list-title">
      <fa-icon [icon]="faBars"></fa-icon>
      {{ 'BATCHES_FAILED_JOBS' | translate }}
    </h3>
    <span class="list-count" *ngIf="count$ | async as count">
      ({{ count }})
    </span>
  </header>

  <div class="list-content">
    <ng-container *ngIf="{
      jobs: jobs$ | async,
      count: count$ | async,
      loading: loading$ | async,
      currentPage: currentPage$ | async,
      pageSize: pageSize$ | async,
      sorting: sorting$ | async
    } as data">
      <!-- Loading state -->
      <div class="loading-state" *ngIf="data.loading === 'LOADING'">
        <fa-icon [icon]="faSpinner" [animation]="'spin'"></fa-icon>
        <span>{{ 'LOADING' | translate }}</span>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="data.loading === 'EMPTY' || (data.loading === 'LOADED' && data.jobs?.length === 0)">
        <span>{{ 'BATCHES_NO_FAILED_JOBS' | translate }}</span>
      </div>

      <!-- Jobs table -->
      <div class="table-container" *ngIf="data.loading === 'LOADED' && data.jobs && data.jobs.length > 0">
        <table class="jobs-table">
          <thead>
            <tr>
              <th *ngFor="let column of columns"
                  [class.sortable]="column.sortable"
                  (click)="column.sortable && onSort(column, data.sorting!)">
                {{ column.label | translate }}
                <fa-icon *ngIf="column.sortable"
                         [icon]="getSortIcon(column, data.sorting!)"
                         class="sort-icon">
                </fa-icon>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let job of data.jobs; trackBy: trackByJobId">
              <td class="job-id">
                <code>{{ job.id }}</code>
              </td>
              <td class="job-exception">
                <span class="exception-preview"
                      [appTooltip]="job.exceptionMessage || ''"
                      tooltipPosition="top">
                  {{ getExceptionPreview(job) }}
                </span>
                <a *ngIf="job.exceptionMessage"
                   [href]="getStacktraceUrl(job)"
                   target="_blank"
                   class="stacktrace-link"
                   [appTooltip]="'BATCHES_VIEW_STACKTRACE' | translate"
                   tooltipPosition="top">
                  <fa-icon [icon]="faExternalLinkAlt"></fa-icon>
                </a>
              </td>
              <td class="job-actions">
                <button class="btn-action btn-retry"
                        (click)="onRetryJob(job)"
                        [appTooltip]="'BATCHES_RETRY_JOB' | translate"
                        tooltipPosition="top">
                  <fa-icon [icon]="faRedo"></fa-icon>
                </button>
                <button class="btn-action btn-delete"
                        (click)="onDeleteJob(job)"
                        [appTooltip]="'BATCHES_DELETE_JOB' | translate"
                        tooltipPosition="top">
                  <fa-icon [icon]="faTrash"></fa-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <app-pagination *ngIf="data.count && data.count > 0 && data.pageSize && data.count > data.pageSize"
                      [total]="data.count"
                      [current]="data.currentPage || 1"
                      [size]="data.pageSize"
                      (pageChange)="onPageChange($event)">
      </app-pagination>
    </ng-container>
  </div>
</section>
