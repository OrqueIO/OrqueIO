<div class="notifications-panel">
  <div
    *ngFor="let notification of notifications; trackBy: trackByNotification"
    class="notification"
    [ngClass]="getTypeClass(notification)"
    [style.--duration]="(notification.duration || 0) + 'ms'"
    role="alert"
  >
    <div class="notification__content">
      <div class="notification__icon-wrapper">
        <fa-icon class="notification__icon" [icon]="getIcon(notification)"></fa-icon>
      </div>
      <div class="notification__text">
        <strong class="notification__status">{{ notification.status }}</strong>
        <span class="notification__message" *ngIf="notification.message">{{ notification.message }}</span>
      </div>
    </div>
    <button type="button" class="notification__close" (click)="removeNotification(notification)" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="notification__progress" *ngIf="notification.duration"></div>
  </div>
</div>
