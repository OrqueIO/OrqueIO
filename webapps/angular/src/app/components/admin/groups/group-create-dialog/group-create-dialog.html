<div class="dialog-backdrop" (click)="onBackdropClick($event)">
  <div class="dialog-container" role="dialog" aria-modal="true">
    <div class="dialog-header">
      <h3 class="dialog-title">{{ 'admin.groups.createGroup' | translate }}</h3>
    </div>

    <form [formGroup]="groupForm" (ngSubmit)="onSubmit()">
      <div class="dialog-body">
        <div class="form-group">
          <label for="groupId">{{ 'admin.groups.id' | translate }} *</label>
          <input
            id="groupId"
            type="text"
            formControlName="id"
            class="form-control"
            [class.is-invalid]="idError" />
          <span *ngIf="idError" class="error-message">
            {{ idError | translate }}
          </span>
        </div>

        <div class="form-group">
          <label for="groupName">{{ 'admin.groups.name' | translate }} *</label>
          <input
            id="groupName"
            type="text"
            formControlName="name"
            class="form-control"
            [class.is-invalid]="nameError" />
          <span *ngIf="nameError" class="error-message">
            {{ nameError | translate }}
          </span>
        </div>

        <div class="form-group">
          <label for="groupType">{{ 'admin.groups.type' | translate }}</label>
          <input
            id="groupType"
            type="text"
            formControlName="type"
            class="form-control" />
        </div>
      </div>

      <div class="dialog-footer">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="onCancel()"
          [disabled]="saving">
          {{ 'CANCEL' | translate }}
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="!groupForm.valid || saving">
          <span *ngIf="saving">{{ 'CREATING' | translate }}...</span>
          <span *ngIf="!saving">{{ 'admin.groups.createNewGroup' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
